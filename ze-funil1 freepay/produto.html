  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Poppins', sans-serif; background: #fff; color: #1A1A1A;
           animation: slideInRight .28s cubic-bezier(.25,.46,.45,.94) both; }

    @keyframes slideInRight {
      from { transform: translateX(100%); opacity: .6; }
      to   { transform: translateX(0);    opacity: 1; }
    }

    /* ── Header ── */
    .p-header {
      position: sticky; top: 0; z-index: 100;
      background: #ffcc01;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px;
    }
    .p-header-btn {
      background: none; border: none; cursor: pointer;
      width: 38px; height: 38px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: #1A1A1A; transition: background .2s;
    }
    .p-header-btn:hover { background: rgba(0,0,0,.1); }
    .p-header-title { font-weight: 700; font-size: 16px; }
    .p-cart-wrap { position: relative; }
    .p-cart-badge {
      position: absolute; top: -4px; right: -4px;
      background: #1A1A1A; color: #ffcc01;
      border-radius: 50%; width: 18px; height: 18px;
      font-size: 10px; font-weight: 700;
      display: none; align-items: center; justify-content: center;
    }

    /* ── Imagem ── */
    .p-img-wrap {
      width: 100%; height: 300px; background: #f8f8f8;
      position: relative; overflow: hidden;
    }
    .p-img {
      width: 100%; height: 100%; object-fit: contain;
      object-position: center; display: block; padding: 16px;
    }
    /* Gradiente suave na base da imagem */
    .p-img-wrap::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 60px;
      background: linear-gradient(to bottom, transparent, #fff);
      pointer-events: none;
    }
    /* Badge de desconto */
    .p-discount-badge {
      display: none;
      position: absolute; top: 14px; left: 14px;
      background: #e53935; color: #fff;
      font-size: 13px; font-weight: 700;
      border-radius: 8px; padding: 5px 10px;
      box-shadow: 0 2px 6px rgba(229,57,53,.35);
      z-index: 2;
    }

    /* ── Corpo ── */
    .p-body { padding: 12px 16px 120px; }
    .p-nome { display: none; }

    /* Chip urgência */
    .p-urgency {
      display: inline-flex; align-items: center; gap: 5px;
      background: #fff8e1; border: 1px solid #ffe082;
      border-radius: 20px; padding: 4px 10px;
      font-size: 11px; font-weight: 700; color: #7a5f00;
      margin-bottom: 10px;
    }

    .p-desc { font-size: 15px; color: #1A1A1A; line-height: 1.5; margin-bottom: 14px; font-weight: 600; }

    /* ── Preço ── */
    .p-preco-box { margin-bottom: 14px; }
    .p-preco-antigo { font-size: 13px; color: #bbb; text-decoration: line-through; margin-bottom: 2px; }
    .p-preco-novo { font-size: 30px; font-weight: 700; color: #077c22; line-height: 1.1; margin-bottom: 8px; }
    .p-economia {
      display: inline-flex; align-items: center; gap: 5px;
      background: #e8f5e9; border-radius: 20px; padding: 5px 12px;
      font-size: 12px; font-weight: 700; color: #2e7d32;
    }
    .p-economia i { font-size: 11px; }

    /* Divider */
    .p-divider { border: none; border-top: 1px solid #f0f0f0; margin: 16px 0; }

    /* ── Observação colapsável ── */
    .p-obs-toggle {
      display: flex; align-items: center; gap: 6px;
      background: none; border: none; cursor: pointer;
      font-family: 'Poppins', sans-serif; font-size: 13px; font-weight: 600;
      color: #888; padding: 0; transition: color .2s;
    }
    .p-obs-toggle:hover { color: #555; }
    .p-obs-toggle i { font-size: 12px; transition: transform .2s; }
    .p-obs-toggle.open i { transform: rotate(45deg); }
    .p-obs-wrap {
      max-height: 0; overflow: hidden;
      transition: max-height .25s ease, opacity .2s ease, margin-top .2s;
      opacity: 0;
    }
    .p-obs-wrap.open { max-height: 120px; opacity: 1; margin-top: 10px; }
    .p-obs {
      width: 100%; border: 1.5px solid #e8e8e8; border-radius: 10px;
      padding: 10px 12px; font-family: 'Poppins', sans-serif;
      font-size: 13px; color: #555; resize: none; outline: none;
      transition: border-color .2s; background: #fafafa;
    }
    .p-obs:focus { border-color: #ffcc01; background: #fff; }

    /* ── Barra inferior fixa ── */
    .p-bottom {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #fff; border-top: 1px solid #eee;
      padding: 12px 16px 16px; z-index: 200;
    }
    .p-bottom-inner { display: flex; align-items: center; gap: 12px; }
    .p-qty {
      display: flex; align-items: center; gap: 10px;
      background: #f5f5f5; border-radius: 24px; padding: 7px 14px;
      flex-shrink: 0;
    }
    .p-qty-btn {
      background: none; border: none; cursor: pointer;
      font-size: 20px; font-weight: 700; color: #1A1A1A;
      width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
      border-radius: 50%; transition: background .15s;
    }
    .p-qty-btn:hover:not(:disabled) { background: #e0e0e0; }
    .p-qty-btn:disabled { opacity: .35; cursor: default; }
    .p-qty-num { font-size: 16px; font-weight: 700; min-width: 22px; text-align: center; }
    .p-add-btn {
      flex: 1; background: #ffcc01; color: #1A1A1A; border: none;
      border-radius: 24px; padding: 14px 18px;
      font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 15px;
      cursor: pointer; display: flex; align-items: center; justify-content: space-between;
      transition: background .2s;
    }
    .p-add-btn:hover { background: #f0c000; }
    .p-add-btn.success { background: #077c22; color: #fff; justify-content: center; gap: 8px; }
    /* Preço total no botão */
    .p-add-btn-price { font-size: 14px; font-weight: 700; opacity: .85; }
  </style>
</head>
<body>

  <div class="p-header">
    <button class="p-header-btn" onclick="goBack()"><i class="fa fa-chevron-left"></i></button>
    <span class="p-header-title">Zé Delivery</span>
    <button class="p-header-btn p-cart-wrap" onclick="window.location.href='carrinho.html'">
      <i class="fa fa-shopping-cart"></i>
      <span id="badge" class="p-cart-badge">0</span>
    </button>
  </div>

  <div class="p-img-wrap">
    <div class="p-discount-badge" id="p-discount-badge"></div>
    <img id="p-img" class="p-img" src="" alt="" decoding="async" fetchpriority="high">
  </div>

  <div class="p-body">
    <h1 id="p-nome" class="p-nome"></h1>

    <div class="p-urgency"><i class="fa fa-fire" style="color:#e53935"></i> Oferta por tempo limitado</div>

    <p id="p-desc" class="p-desc"></p>

    <div class="p-preco-box">
      <div id="p-antigo" class="p-preco-antigo"></div>
      <div id="p-novo"   class="p-preco-novo"></div>
      <div id="p-economia" class="p-economia" style="display:none">
        <i class="fa fa-tag"></i>
        <span id="p-economia-txt"></span>
      </div>
    </div>

    <hr class="p-divider">

    <button class="p-obs-toggle" id="obs-toggle" onclick="toggleObs()">
      <i class="fa fa-plus"></i> Adicionar observação
    </button>
    <div class="p-obs-wrap" id="obs-wrap">
      <textarea id="p-obs" class="p-obs" rows="3" placeholder="Ex: sem gelo, embalagem especial..."></textarea>
    </div>
  </div>

  <div class="p-bottom">
    <div class="p-bottom-inner">
      <div class="p-qty">
        <button class="p-qty-btn" id="btn-m" onclick="changeQty(-1)" disabled>−</button>
        <span class="p-qty-num" id="qty">1</span>
        <button class="p-qty-btn" id="btn-p" onclick="changeQty(1)">+</button>
      </div>
      <button class="p-add-btn" id="btn-add" onclick="addToCart()">
        <span>Adicionar</span>
        <span class="p-add-btn-price" id="btn-price">R$ 0,00</span>
      </button>
    </div>
  </div>

  <script src="js/produtos.js"></script>
  <script src="js/carrinho-data.js"></script>
  <script>
    var prod = null, qty = 1;

    function fmt(v) { return 'R$ ' + v.toFixed(2).replace('.', ','); }

    function goBack() {
      if (document.referrer && document.referrer.includes(location.hostname)) history.back();
      else window.location.href = 'index.html';
    }

    function updatePrice() {
      document.getElementById('btn-price').textContent = fmt(prod.preco * qty);
    }

    function changeQty(d) {
      qty = Math.max(1, Math.min(99, qty + d));
      document.getElementById('qty').textContent = qty;
      document.getElementById('btn-m').disabled = qty <= 1;
      updatePrice();
    }

    function toggleObs() {
      var wrap   = document.getElementById('obs-wrap');
      var toggle = document.getElementById('obs-toggle');
      var open   = wrap.classList.toggle('open');
      toggle.classList.toggle('open', open);
      toggle.querySelector('i').className = open ? 'fa fa-minus' : 'fa fa-plus';
      toggle.childNodes[1].textContent = open ? ' Remover observação' : ' Adicionar observação';
      if (open) setTimeout(function() { document.getElementById('p-obs').focus(); }, 260);
    }

    function addToCart() {
      if (!prod) return;
      var obs = document.getElementById('p-obs').value.trim();
      CarrinhoData.adicionar(prod, qty, obs);

      var btn = document.getElementById('btn-add');
      btn.classList.add('success');
      btn.innerHTML = '<i class="fa fa-check"></i><span>Adicionado!</span>';
      setTimeout(function() { window.location.href = 'carrinho.html'; }, 700);
    }

    (function init() {
      var id = parseInt(new URLSearchParams(location.search).get('id'));
      prod = PRODUTOS.find(function(p) { return p.id === id; });
      if (!prod) { location.href = 'index.html'; return; }

      document.title = prod.nome + ' - Zé Delivery';
      document.getElementById('p-img').src  = prod.img;
      document.getElementById('p-img').alt  = prod.nome;
      document.getElementById('p-nome').textContent  = prod.nome;
      document.getElementById('p-desc').textContent  = prod.desc;
      document.getElementById('p-novo').textContent  = fmt(prod.preco);

      if (prod.precoAntigo && prod.precoAntigo > prod.preco) {
        document.getElementById('p-antigo').textContent = 'De: ' + fmt(prod.precoAntigo);

        /* Badge % de desconto na imagem */
        var pct = Math.round((1 - prod.preco / prod.precoAntigo) * 100);
        var badge = document.getElementById('p-discount-badge');
        badge.textContent = '-' + pct + '%';
        badge.style.display = 'block';

        /* Linha de economia */
        var economia = prod.precoAntigo - prod.preco;
        var econEl = document.getElementById('p-economia');
        document.getElementById('p-economia-txt').textContent =
          'Você economiza ' + fmt(economia) + ' nessa oferta';
        econEl.style.display = 'inline-flex';
      }

      updatePrice();

      var n = CarrinhoData.totalItens();
      var b = document.getElementById('badge');
      if (n > 0) { b.style.display = 'flex'; b.textContent = n; }
    })();
  </script>
</body>
</html>
